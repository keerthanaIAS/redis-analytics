services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    restart: unless-stopped

  app1:
    build: .
    environment:
      - INSTANCE_NAME=app1
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - redis
    restart: unless-stopped

  app2:
    build: .
    environment:
      - INSTANCE_NAME=app2
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      - redis
    restart: unless-stopped

  app3:
    build: .
    environment:
      - INSTANCE_NAME=app3
      - PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      - redis
    restart: unless-stopped